<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 100%;
    max-width: 400px;
}

.card {
    background: #f2f2f2;
    padding: 30px;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.card h2 {
    margin-bottom: 10px;
}

.card p {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
}

input:focus {
    border-color: #667eea;
}

button {
    width: 100%;
    padding: 12px;
    background: #667eea;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #5a67d8;
}

a {
    display: block;
    margin-top: 15px;
    text-decoration: none;
    color: #667eea;
    font-size: 14px;
}
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Create Account</h2>
        <p>Sign up to get started</p>

        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>

            <button type="submit">Sign Up</button>
        </form>

        <a href="sign in .html">Already have an account? Login</a>
    </div>
</div><script>
// Form select
const form = document.querySelector("form");

// Inputs
const nameInput = document.querySelector("input[type='text']");
const emailInput = document.querySelector("input[type='email']");
const passwordInput = document.querySelectorAll("input[type='password']")[0];
const confirmPasswordInput = document.querySelectorAll("input[type='password']")[1];

// Message box
const message = document.createElement("p");
message.style.marginTop = "10px";
form.appendChild(message);

// Email validation
function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

form.addEventListener("submit", function(e) {
    e.preventDefault(); // page reload stop

    const name = nameInput.value.trim();
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
    const confirmPassword = confirmPasswordInput.value.trim();

    // Empty check
    if (name === "" || email === "" || password === "" || confirmPassword === "") {
        message.style.color = "red";
        message.textContent = "Please fill all fields ❌";
        return;
    }

    // Email format
    if (!isValidEmail(email)) {
        message.style.color = "red";
        message.textContent = "Invalid email format ❌";
        return;
    }

    // Password length
    if (password.length < 4) {
        message.style.color = "red";
        message.textContent = "Password must be at least 4 characters ❌";
        return;
    }

    // Password match
    if (password !== confirmPassword) {
        message.style.color = "red";
        message.textContent = "Passwords do not match ❌";
        return;
    }

    // Success
    message.style.color = "green";
    message.textContent = "Account Created Successfully ✅";

    // Optional redirect after 2 sec
    setTimeout(() => {
        window.location.href = "sign in.html";
    }, 2000);

    // Clear form
    form.reset();
});
</script>

</body>
</html>
